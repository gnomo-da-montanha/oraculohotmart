<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Liberando acesso...</title>

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  background:#000;
  color:#f5d27a;
  font-family:'Segoe UI',sans-serif;
  text-align:center;
}

.loader{
  width:60px;
  height:60px;
  border:5px solid rgba(255,255,255,0.1);
  border-top:5px solid gold;
  border-radius:50%;
  animation:girar 1s linear infinite;
  margin-bottom:25px;
}

@keyframes girar{
  to{
    transform:rotate(360deg);
  }
}
</style>
</head>
<body>

<div class="loader"></div>

<h2>🔮 Confirmando pagamento...</h2>

<p>
Seu acesso ao Oráculo está sendo liberado.
</p>

<script>

const API = 'https://oraculohotmart-backend.onrender.com';

async function liberar(){

  try{

    // cria token único
    const r = await fetch(API + '/criar-token', {
      method:'POST',
      headers:{
        'Content-Type':'application/json'
      }
    });

    const res = await r.json();

    // redireciona para o oráculo
    window.location.href =
      'https://gnomo-da-montanha.github.io/oraculohotmart/?token=' + res.token;

  }catch(e){

    alert('Erro ao liberar acesso.');

  }

}

liberar();

</script>

</body>
</html>
