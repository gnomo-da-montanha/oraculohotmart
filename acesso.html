<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Acesso Liberado - Oráculo</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b0b0b;
  color:#f5d27a;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  text-align:center;
}

.box{
  max-width:500px;
  padding:30px;
  background:#111;
  border-radius:16px;
  border:1px solid rgba(255,215,0,0.2);
}

button{
  padding:14px 20px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-weight:bold;
  background:linear-gradient(45deg,#7b1fd3,#b05cff);
  color:white;
  margin-top:20px;
}

button:disabled{
  opacity:0.5;
  cursor:not-allowed;
}
</style>

</head>
<body>

<div class="box">
  <h1>🔮 Acesso Liberado</h1>
  <p id="status">Validando sua compra...</p>

  <button id="btn" disabled onclick="entrar()">
    Acessar Oráculo
  </button>
</div>

<script>

const API = "https://oraculohotmart-backend.onrender.com";

const token = new URLSearchParams(window.location.search).get("token");

let valido = false;

async function validar(){

  if(!token){
    document.getElementById("status").innerText = "Token inválido.";
    return;
  }

  try{

    const r = await fetch(API + "/validar-token", {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({ token })
    });

    const res = await r.json();

    if(res.valido){
      valido = true;
      document.getElementById("status").innerText = "Compra confirmada ✔";
      document.getElementById("btn").disabled = false;
    } else {
      document.getElementById("status").innerText = "Acesso negado ou já utilizado.";
    }

  } catch(e){
    document.getElementById("status").innerText = "Erro ao validar acesso.";
  }
}

function entrar(){
  if(!valido) return;

  // aqui entra no seu tarot real
  window.location.href = "https://SEU-GITHUB.github.io/tarot?token=" + token;
}

validar();

</script>

</body>
</html>
