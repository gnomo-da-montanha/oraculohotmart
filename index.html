<!DOCTYPE html>

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oráculo da Cruz Celta</title>

<meta name="description" content="Leitura guiada da Cruz Celta com os Arcanos Maiores.">
<link rel="manifest" href="manifest.json">

<style>
*{box-sizing:border-box;}

html,body{
  margin:0;
  padding:0;
  min-height:100%;
  font-family:'Segoe UI',sans-serif;
  background:
    radial-gradient(circle at top left, rgba(106,13,173,0.25), transparent 35%),
    radial-gradient(circle at bottom right, rgba(255,215,0,0.12), transparent 35%),
    linear-gradient(180deg,#000,#050505,#0b0b0b);
  color:#ead9a0;
  text-align:center;
}

.hero{padding:40px 20px 10px;}
.hero h1{margin:0;font-size:42px;}
.sub{margin-top:10px;color:#f5d27a;font-size:22px;}

.container{max-width:1100px;margin:auto;padding:20px;}

.card-box{
  max-width:480px;
  margin:30px auto;
  background:#111;
  border:1px solid rgba(255,215,0,0.12);
  border-radius:18px;
  padding:30px;
}

.question{text-align:left;margin-bottom:28px;}
.options{display:flex;flex-direction:column;gap:10px;}

.option{
  background:#191919;
  border:1px solid #333;
  border-radius:10px;
  padding:14px;
  cursor:pointer;
}

.option.selected{background:#6a0dad;color:#fff;}

button{
  border:none;
  cursor:pointer;
  border-radius:10px;
  padding:14px 22px;
  font-weight:bold;
}

.primary{width:100%;background:#7b1fd3;color:white;}

#payment,#game,#duvida{display:none;}

#board{
  display:grid;
  grid-template-columns:repeat(4,100px);
  grid-template-rows:repeat(4,160px);
  gap:12px;
  justify-content:center;
  margin:40px auto;
}

.card{
  width:100px;
  height:160px;
  border-radius:12px;
  overflow:hidden;
  cursor:pointer;
}

.card img{width:100%;height:100%;object-fit:cover;}

#output{
  max-width:760px;
  margin:20px auto 100px;
  text-align:left;
  padding:25px;
  background:rgba(255,255,255,0.03);
  border-radius:18px;
}

.leitura{margin-bottom:20px;border-bottom:1px solid rgba(255,215,0,0.15);}
</style>
</head>

<body>

<div class="hero">
  <h1>🔮 Auto Leitura dos Arcanos Maiores</h1>
  <div class="sub">O tarot sem intermediários.</div>
</div>

<div class="container">

<!-- PRE LEITURA -->
<div id="preLeitura" class="card-box">
  <h2>Antes da leitura</h2>

  <div class="question">
    <p>Você sente ciclos repetidos?</p>
    <div class="options">
      <div class="option" onclick="selecionar(this,'q1')">Sim</div>
      <div class="option" onclick="selecionar(this,'q1')">Não</div>
    </div>
  </div>

  <div class="question">
    <p>Deseja continuar?</p>
    <div class="options">
      <div class="option" onclick="selecionar(this,'q2')">Sim</div>
      <div class="option" onclick="selecionar(this,'q2')">Não</div>
    </div>
  </div>

  <button id="btnContinuar" class="primary" disabled onclick="abrirPagamento()">Continuar</button>
</div>

<!-- PAGAMENTO -->
<div id="payment">
  <div class="card-box">
    <h2>🔮 Liberar leitura</h2>
    <button class="primary" onclick="liberarOraculo()">Liberar Oráculo</button>
  </div>
</div>

<!-- GAME -->
<div id="game">
  <div id="board"></div>
  <div id="output"></div>
</div>

</div>

<script>

const API = "https://oraculohotmart-backend.onrender.com";

let token = new URLSearchParams(location.search).get("token");
let respostas = {};
let cartasViradas = 0;

function selecionar(el, q){
  document.querySelectorAll(`[onclick*="${q}"]`)
    .forEach(e=>e.classList.remove("selected"));

  el.classList.add("selected");
  respostas[q] = el.innerText;

  if(Object.keys(respostas).length >= 2){
    document.getElementById("btnContinuar").disabled = false;
  }
}

/* ================= VALIDAR ================= */
async function validarToken(){
  if(!token) return false;

  try{
    const r = await fetch(API+"/validar-token",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({token})
    });

    const j = await r.json();
    return j.valido;
  }catch(e){
    return false;
  }
}

/* ================= INIT ================= */
window.addEventListener("DOMContentLoaded", async ()=>{

  const ok = await validarToken();

  if(!ok){
    document.body.innerHTML = "Acesso inválido ou expirado";
    return;
  }

  document.getElementById("preLeitura").style.display="block";
});

/* ================= FLUXO ================= */
function abrirPagamento(){
  document.getElementById("preLeitura").style.display="none";
  document.getElementById("payment").style.display="block";
}

function liberarOraculo(){
  document.getElementById("payment").style.display="none";
  document.getElementById("game").style.display="block";
  iniciarOraculo();
}

function shuffle(a){
  return a.sort(()=>Math.random()-0.5);
}

function iniciarOraculo(){

  cartasViradas = 0;

  const board = document.getElementById("board");
  const output = document.getElementById("output");

  board.innerHTML="";
  output.innerHTML="";

  const spread = shuffle([...cards]).slice(0,10);

  spread.forEach((c,i)=>{

    const div = document.createElement("div");
    div.className="card";
    div.innerHTML='<img src="img/verso.jpg">';

    div.onclick=()=>revelar(div,c,posicoes[i]);

    board.appendChild(div);
  });
}

function revelar(div,carta,posicao){

  if(div.classList.contains("open")) return;

  div.classList.add("open");

  cartasViradas++;

  const invertida = Math.random()<0.5;

  div.innerHTML=`<img src="${carta.img}">`;

  if(invertida){
    div.firstChild.style.transform="rotate(180deg)";
  }

  document.getElementById("output").innerHTML+=`
    <div class="leitura">
      <h3>${posicao}</h3>
      <p><b>${carta.nome}</b></p>
      <p>${invertida?carta.sombra:carta.luz}</p>
    </div>
  `;
}
